<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json">
    <title>Genealogy Tree Viewer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: Arial, Helvetica, sans-serif;
        overflow: hidden;
      }

      #chart {
        width: calc(100% - 20px);
        height: calc(100% - 20px);
        margin: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fafafa;
      }

      svg {
        width: 100%;
        height: 100%;
        cursor: grab;
      }

      svg.grabbing {
        cursor: grabbing;
      }

      .link {
        fill: none;
        stroke: #999;
        stroke-width: 1.5px;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .node rect {
        fill: #fff;
        stroke: steelblue;
        stroke-width: 2px;
        rx: 4;
        ry: 4;
        cursor: pointer;
      }

      .node.expanded rect {
        stroke-width: 3px;
        stroke: #0056b3;
      }

      .node text.name {
        font: bold 13px sans-serif;
        pointer-events: none;
        fill: #333;
      }

      .node text.details {
        font: 10px sans-serif;
        pointer-events: none;
        fill: #666;
      }

      .node text.label {
        font: 10px sans-serif;
        pointer-events: none;
        fill: #999;
      }

      .node text.details,
      .node text.label {
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .node.expanded text.details,
      .node.expanded text.label {
        opacity: 1;
      }
    </style>
</head>

<body>
    <div id="chart"></div>

    <!-- d3 and elk are expected by ui/tree_viewer.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/elkjs/lib/elk.bundled.js"></script>

    <script type="module" src="/main.js"></script>
</body>

</html>
