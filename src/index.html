<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json">
    <title>Genealogy Tree Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
        }

        /* Theme variables - default (light) */
        :root {
            --bg: #fafafa;
            --page-bg: #fff;
            --border: #ccc;
            --text: #333;
            --muted: #666;
            --label: #999;
            --link-stroke: #999;
            --node-fill: #fff;
            --node-stroke: steelblue;
            --node-stroke-selected: #0056b3;
            --chart-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --overlay-bg: rgba(255, 255, 255, 0.95);
            --spinner-border: #ddd;
            --spinner-top: #333;
        }

        /* Respect system preference by default */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0b1220;
                --page-bg: #0b1220;
                --border: #22272b;
                --text: #e6eef8;
                --muted: #9aa0a6;
                --label: #7d8893;
                --link-stroke: #4b5563;
                --node-fill: #061018;
                --node-stroke: #3b82f6;
                --node-stroke-selected: #60a5fa;
                --chart-shadow: 0 6px 18px rgba(0, 0, 0, 0.6);
                --overlay-bg: rgba(8, 10, 12, 0.85);
                --spinner-border: #333;
                --spinner-top: #ddd;
            }
        }

        /* Explicit user overrides */
        html[data-theme="dark"] {
            --bg: #0b1220;
            --page-bg: #0b1220;
            --border: #22272b;
            --text: #e6eef8;
            --muted: #9aa0a6;
            --label: #7d8893;
            --link-stroke: #4b5563;
            --node-fill: #061018;
            --node-stroke: #3b82f6;
            --node-stroke-selected: #60a5fa;
            --chart-shadow: 0 6px 18px rgba(0, 0, 0, 0.6);
            --overlay-bg: rgba(8, 10, 12, 0.85);
            --spinner-border: #333;
            --spinner-top: #ddd;
        }

        html[data-theme="light"] {
            --bg: #fafafa;
            --page-bg: #fff;
            --border: #ccc;
            --text: #333;
            --muted: #666;
            --label: #999;
            --link-stroke: #999;
            --node-fill: #fff;
            --node-stroke: steelblue;
            --node-stroke-selected: #0056b3;
            --chart-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --overlay-bg: rgba(255, 255, 255, 0.95);
            --spinner-border: #ddd;
            --spinner-top: #333;
        }

        /* Smooth color transitions */
        html,
        body,
        #chart,
        .theme-toggle {
            transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        /* Controls bar */
        #controls {
            padding: 10px;
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--page-bg);
            border-bottom: 1px solid var(--border);
        }

        #person-search {
            flex: 1;
            padding: 8px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        #search-btn {
            padding: 8px 12px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        /* Chart container */
        #chart {
            position: relative;
            width: calc(100% - 20px);
            height: calc(100% - 20px);
            margin: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--page-bg);
        }

        svg {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        svg.grabbing {
            cursor: grabbing;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--spinner-border);
            border-top-color: var(--spinner-top);
            border-radius: 50%;
            display: inline-block;
            vertical-align: middle;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .chart-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--overlay-bg);
            border-radius: 6px;
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            align-items: center;
            box-shadow: var(--chart-shadow);
            font-size: 14px;
            color: var(--text);
            z-index: 500;
        }

        .link {
            fill: none;
            stroke: var(--link-stroke);
            stroke-width: 1.5px;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .node rect {
            fill: var(--node-fill);
            stroke: var(--node-stroke);
            stroke-width: 2px;
            rx: 4;
            ry: 4;
            cursor: pointer;
        }

        .node.expanded rect {
            stroke-width: 3px;
            stroke: var(--node-stroke-selected);
        }

        .node text.name {
            font: bold 13px sans-serif;
            pointer-events: none;
            fill: var(--node-text, var(--text));
        }

        .node text.details {
            font: 10px sans-serif;
            font-weight: normal;
            pointer-events: none;
            fill: var(--node-text, var(--text));
        }

        .node text.label {
            font: 10px sans-serif;
            pointer-events: none;
            fill: var(--label);
        }

        .node text.details,
        .node text.label {
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .node.expanded text.details,
        .node.expanded text.label {
            opacity: 1;
        }

        #search-results {
            position: fixed;
            top: 62px;
            left: 10px;
            right: 10px;
            max-height: 200px;
            overflow: auto;
            display: none;
            background: var(--page-bg);
            border: 1px solid var(--border);
            box-shadow: var(--chart-shadow);
            z-index: 1000;
        }

        .theme-toggle {
            background: var(--page-bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 20px;
            box-shadow: var(--chart-shadow);
            cursor: pointer;
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 13px;
        }

        .theme-toggle.icon-only {
            padding: 6px;
            border-radius: 6px;
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            margin-left: 8px;
        }

        .theme-toggle .icon {
            font-size: 14px;
        }

        .theme-toggle .label {
            display: none;
        }

        /* Chart metadata badge - now styled inline with view-switcher above */

        /* When the page requires authentication, show a full-screen login view */
        body.auth-required {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Use the page background so the view appears full-screen and not a small white rectangle */
            background: var(--page-bg);
        }

        body.auth-required #main-controls,
        body.auth-required #chart,
        body.auth-required #search-results {
            display: none !important;
        }

        body.auth-required #controls {
            width: 100%;
            justify-content: center;
            border-bottom: none;
            padding: 40px 20px;
            box-shadow: none;
        }

        body.auth-required #theme-toggle {
            display: none !important;
        }

        body.auth-required #login-btn {
            display: inline-block !important;
            font-weight: 600;
            padding: 10px 18px;
            background: var(--node-stroke-selected);
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
        }

        body.auth-required #login-btn:hover {
            filter: brightness(0.95);
        }

        /* User email clickable styling */
        #user-email {
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            transition: background 160ms ease, color 160ms ease;
        }

        #user-email:hover {
            background: rgba(0, 0, 0, 0.04);
            color: var(--text);
        }



        /* View switcher buttons */
        #view-switcher {
            position: fixed;
            top: 70px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            z-index: 1000;
        }

        .view-btn {
            width: 44px;
            height: 44px;
            background: var(--page-bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s ease;
            box-shadow: var(--chart-shadow);
        }

        .view-btn:hover {
            border-color: var(--node-stroke);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
        }

        .view-btn.active {
            background: var(--node-stroke);
            border-color: var(--node-stroke);
            color: white;
        }

        /* Metrics button styled to match view buttons */
        #chart-meta {
            width: 44px;
            height: 44px;
            background: var(--page-bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s ease;
            box-shadow: var(--chart-shadow);
        }

        #chart-meta:hover {
            border-color: var(--node-stroke);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
        }

        #chart-meta.expanded {
            width: auto;
            height: auto;
            border-radius: 6px;
            font-size: 12px;
            display: block;
            padding: 8px 10px;
            max-width: 95vw;
            max-height: 75vh;
            overflow: auto;
        }

        #chart-meta.collapsed {
            width: 44px;
            height: 44px;
            padding: 0;
        }

        /* Map container */
        #map-container {
            position: relative;
            width: calc(100% - 20px);
            height: calc(100% - 20px);
            margin: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--page-bg);
            display: none;
        }

        #map {
            width: 100%;
            height: 100%;
            border-radius: 4px;
        }

        /* Leaflet theme integration */
        html[data-theme="dark"] .leaflet-tile {
            filter: brightness(0.7) contrast(1.1);
        }

        html[data-theme="dark"] .leaflet-popup-content-wrapper,
        html[data-theme="dark"] .leaflet-popup-tip {
            background: var(--page-bg);
            color: var(--text);
        }

        html[data-theme="dark"] .leaflet-control-zoom a,
        html[data-theme="dark"] .leaflet-bar a {
            background: var(--page-bg);
            color: var(--text);
            border-color: var(--border);
        }

        html[data-theme="dark"] .leaflet-control-zoom a:hover,
        html[data-theme="dark"] .leaflet-bar a:hover {
            background: var(--node-fill);
        }

        .leaflet-popup-content {
            margin: 10px 12px;
            line-height: 1.5;
        }

        .leaflet-popup-content strong {
            font-size: 14px;
            display: block;
            margin-bottom: 6px;
        }

        .leaflet-popup-content div {
            font-size: 13px;
            color: var(--muted);
            margin: 3px 0;
        }

        /* Remove default Leaflet div-icon border/background on custom event markers */
        .leaflet-div-icon,
        .event-marker,
        .custom-cluster-icon {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
        }
    </style>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
</head>

<body>
    <div id="controls">
        <div id="main-controls" style="display:flex;gap:8px;align-items:center;flex:1">
            <input id="person-search" placeholder="Search person by name or id" />
            <button id="search-btn">Search</button>
        </div>
        <div id="auth-controls" style="display:flex;align-items:center;gap:8px;margin-left:8px">
            <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
                <button id="login-btn"
                    style="display:none;padding:8px 12px;border:1px solid var(--border);background:var(--page-bg);color:var(--text);border-radius:6px;cursor:pointer;">Login
                    with Google</button>
            </div>
            <span id="user-email" style="display:none;color:var(--muted);font-size:13px;cursor:pointer;"
                title="Click to sign out of this app"></span>
            <button id="theme-toggle" class="theme-toggle icon-only" aria-pressed="false" title="Toggle theme"
                aria-label="Toggle theme">
                <span class="icon" aria-hidden="true">🌗</span>
                <span class="label">Theme</span>
            </button>
        </div>
    </div>

    <div id="view-switcher">
        <button class="view-btn" id="tree-view-btn" title="Tree View" aria-label="Switch to tree view"
            style="display:none;">🌳</button>
        <button class="view-btn active" id="map-view-btn" title="Map View" aria-label="Switch to map view">🗺️</button>
        <button class="view-btn" id="cluster-toggle-btn" title="Toggle clustering" aria-label="Toggle marker clustering"
            style="display:none;">📍</button>
    </div>

    <div id="chart"></div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <div id="search-results"></div>


    <script>
        (function () {
            const root = document.documentElement;
            const toggle = document.getElementById('theme-toggle');
            const icon = toggle.querySelector('.icon');
            const label = toggle.querySelector('.label');

            function effectiveTheme() {
                const forced = root.getAttribute('data-theme');
                if (forced === 'dark' || forced === 'light') return forced;
                return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }

            function updateButton() {
                const t = effectiveTheme();
                toggle.setAttribute('aria-pressed', t === 'dark' ? 'true' : 'false');
                icon.textContent = t === 'dark' ? '🌙' : '☀️';
                label.textContent = t === 'dark' ? 'Dark' : 'Light';
            }

            // Initialize from saved preference if present
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || saved === 'light') {
                root.setAttribute('data-theme', saved);
            } else {
                root.removeAttribute('data-theme');
            }

            updateButton();

            // Listen to system theme changes (only if user hasn't forced a preference)
            const mq = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
            if (mq && !localStorage.getItem('theme')) {
                mq.addEventListener ? mq.addEventListener('change', updateButton) : mq.addListener(updateButton);
            }

            toggle.addEventListener('click', () => {
                const current = effectiveTheme();
                const next = current === 'dark' ? 'light' : 'dark';
                root.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                updateButton();
            });
        })();
    </script>

    <!-- d3 and elk are expected by ui/tree_viewer.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/elkjs/lib/elk.bundled.js"></script>

    <!-- Leaflet and MarkerCluster -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <script type="module" src="/main.js"></script>
</body>

</html>
