<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Family Tree Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: Arial, Helvetica, sans-serif; overflow: hidden; }

    :root {
      --bg: #fafafa; --page-bg: #fff; --border: #ccc; --text: #333; --muted: #666; --label: #999; --link-stroke: #999; --node-fill: #fff; --node-stroke: steelblue; --node-stroke-selected: #0056b3; --chart-shadow: 0 4px 12px rgba(0,0,0,0.08); --overlay-bg: rgba(255,255,255,0.95); --spinner-border: #ddd; --spinner-top: #333;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0b1220; --page-bg: #0b1220; --border: #22272b; --text: #e6eef8; --muted: #9aa0a6; --label: #7d8893; --link-stroke: #4b5563; --node-fill: #061018; --node-stroke: #3b82f6; --node-stroke-selected: #60a5fa; --chart-shadow: 0 6px 18px rgba(0,0,0,0.6); --overlay-bg: rgba(8,10,12,0.85); --spinner-border: #333; --spinner-top: #ddd; }
    }
    html[data-theme="dark"] { --bg: #0b1220; --page-bg: #0b1220; --border: #22272b; --text: #e6eef8; --muted: #9aa0a6; --label: #7d8893; --link-stroke: #4b5563; --node-fill: #061018; --node-stroke: #3b82f6; --node-stroke-selected: #60a5fa; --chart-shadow: 0 6px 18px rgba(0,0,0,0.6); --overlay-bg: rgba(8,10,12,0.85); --spinner-border: #333; --spinner-top: #ddd; }
    html[data-theme="light"] { --bg: #fafafa; --page-bg: #fff; --border: #ccc; --text: #333; --muted: #666; --label: #999; --link-stroke: #999; --node-fill: #fff; --node-stroke: steelblue; --node-stroke-selected: #0056b3; --chart-shadow: 0 4px 12px rgba(0,0,0,0.08); --overlay-bg: rgba(255,255,255,0.95); --spinner-border: #ddd; --spinner-top: #333; }

    html, body, #chart, #header { transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease; }

    body { background: var(--bg); color: var(--text); }

    #header { position: absolute; top: 10px; left: 10px; z-index: 100; background: var(--page-bg); padding: 10px 15px; border-radius: 4px; box-shadow: var(--chart-shadow); color: var(--text); display:flex; gap:8px; align-items:center; }
    #header h1 { font-size: 18px; margin-bottom: 5px; }
    #header p { font-size: 12px; color: var(--muted); }
    #header .theme-toggle { margin-left:8px; padding:6px; border-radius:6px; width:36px; height:36px; display:inline-flex; align-items:center; justify-content:center; }
    .theme-toggle .label { display:none; }

    #chart { width: calc(100% - 20px); height: calc(100% - 20px); margin: 10px; border: 1px solid var(--border); border-radius: 4px; background: var(--page-bg); }

    svg { width: 100%; height: 100%; cursor: grab; }
    svg.grabbing { cursor: grabbing; }

    .link { fill: none; stroke: var(--link-stroke); stroke-width: 1.5px; stroke-linecap: round; stroke-linejoin: round; }

    .node rect { fill: var(--node-fill); stroke: var(--node-stroke); stroke-width: 2px; rx: 4; ry: 4; cursor: pointer; }
    .node.expanded rect { stroke-width: 3px; stroke: var(--node-stroke-selected); }

    .node text.name { font: bold 13px sans-serif; pointer-events: none; fill: var(--text); }
    .node text.details { font: 10px sans-serif; pointer-events: none; fill: var(--muted); }
    .node text.label { font: 10px sans-serif; pointer-events: none; fill: var(--label); }

    .node text.details, .node text.label { opacity: 0; transition: opacity 0.2s ease; }
    .node.expanded text.details, .node.expanded text.label { opacity: 1; }
  </style>
</head>

<body>
  <div id="header">
    <p>Scroll to zoom · Click and drag to pan</p>
    <button id="theme-toggle" class="theme-toggle icon-only" aria-pressed="false" title="Toggle theme" aria-label="Toggle theme">
      <span class="icon" aria-hidden="true">🌗</span>
      <span class="label">Theme</span>
    </button>
  </div>
  <div id="chart"></div>

  <script>
    (function(){
      const root = document.documentElement;
      const toggle = document.getElementById('theme-toggle');
      const icon = toggle.querySelector('.icon');
      const label = toggle.querySelector('.label');

      function effectiveTheme() { const forced = root.getAttribute('data-theme'); if (forced === 'dark' || forced === 'light') return forced; return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }
      function updateButton(){ const t=effectiveTheme(); toggle.setAttribute('aria-pressed', t==='dark'?'true':'false'); icon.textContent = t==='dark'?'🌙':'☀️'; label.textContent = t==='dark'?'Dark':'Light'; }

      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || saved === 'light') root.setAttribute('data-theme', saved); else root.removeAttribute('data-theme');
      updateButton();
      const mq = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)'); if (mq && !localStorage.getItem('theme')) { mq.addEventListener ? mq.addEventListener('change', updateButton) : mq.addListener(updateButton); }
      toggle.addEventListener('click',()=>{ const current = effectiveTheme(); const next = current==='dark'?'light':'dark'; root.setAttribute('data-theme', next); localStorage.setItem('theme', next); updateButton(); });
    })();
  </script>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/elkjs@0.9.3/lib/elk.bundled.js"></script>
  <script src="tree_viewer.js"></script>
</body>

</html>
